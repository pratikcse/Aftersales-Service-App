{% extends "base.html" %}
{% block title %}New Work Order{% endblock %}
{% block content %}
<div class="page-header"><h1>New Work Order — from {{ q.quotation_no }}</h1></div>

<div class="card" style="max-width:600px;">
    <p class="muted small">Customer: <strong>{{ q.customer.name }}</strong> &nbsp;·&nbsp; PO No: <strong>{{ q.po_number or '-' }}</strong></p>
    <form method="post">
        <div class="field"><label>Expected Delivery Date</label><input type="date" name="expected_delivery_date"></div>
        <div class="field"><label>Remarks</label><textarea name="remarks" rows="3"></textarea></div>
        <button class="btn" type="submit">Create Work Order</button>
    </form>
</div>
{% endblock %}
