{% extends "base.html" %}
{% block title %}New Customer{% endblock %}
{% block content %}
<div class="page-header"><h1>New Customer</h1></div>
<div class="card" style="max-width:600px;">
    <form method="post">
        <div class="field"><label>Customer Name</label><input type="text" name="name" required></div>
        <div class="field"><label>Address</label><textarea name="address" rows="3"></textarea></div>
        <div class="field"><label>State</label><input type="text" name="state" placeholder="e.g. Maharashtra"></div>
        <div class="field"><label>GST No.</label><input type="text" name="gst_no"></div>
        <div class="field"><label>Kind Attention (default contact)</label><input type="text" name="kind_attention"></div>
        <div class="field"><label>Email</label><input type="email" name="email"></div>
        <button class="btn" type="submit">Save Customer</button>
    </form>
</div>
{% endblock %}
